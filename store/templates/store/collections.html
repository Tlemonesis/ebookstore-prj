{% extends 'store/layouts/main.html' %}

{% block content %}
<div class="py-3 bg-primary">
  <div class="container">
      <a class="text-white" href="{% url 'home' %}"> Home /</a>
      <a class="text-white" href="{% url 'collections' %}"> Genres </a>
  </div>
</div>
<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h1>Genres</h1>
      <hr>
      <div class="row">
        {% for item in category %}
          <div class="col-md-3 mt-3">
            <div class="card">
              <a href="{% url 'collectionsview' item.slug %}">
                <div class="card-body">
                  <div class="category-image">
                      <img height="150px" src="{{ item.image_link }}" alt="Category image" style="display: block; margin: 0 auto;" />
                  </div>
                  <hr>
                  <h5 class="text-center"> {{ item.name }} </h5>
                </div>
              </a>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
  
{% endblock content %}
